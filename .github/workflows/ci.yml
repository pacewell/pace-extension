name: CI

on:
  push:
  pull_request:

jobs:
  check:
    name: lint · build · unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm test

  e2e:
    name: e2e (playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Full Chromium (not headless-shell) + OS deps — required to load the MV3
      # extension into a persistent context.
      - run: npx playwright install --with-deps chromium
      # xvfb gives the extension a display on the headless Linux runner; the e2e
      # script rebuilds dist/ before running.
      - run: xvfb-run -a npm run e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
